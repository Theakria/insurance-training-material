<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>保险行业险种与业务介绍</title>
<style>body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:#f4f6f3;color:#20272d}.loading{max-width:520px;padding:28px;border:1px solid #dbe2e7;border-radius:12px;background:#fffdf8;box-shadow:0 22px 70px rgba(39,51,58,.1)}b{color:#9f1f17}</style>
</head>
<body>
<div class="loading"><b>保险培训材料</b><br>正在加载完整页面...</div>
<script>
(async()=>{
  const files=['assets/index.b64.01.txt','assets/index.b64.02.txt','assets/index.b64.03.txt','assets/index.b64.04.txt','assets/index.b64.05.txt','assets/index.b64.06.txt','assets/index.b64.07.txt','assets/index.b64.08.txt','assets/index.b64.09.txt'];
  try{
    const chunks=await Promise.all(files.map((file)=>fetch(file,{cache:'no-cache'}).then((res)=>{if(!res.ok)throw new Error(file);return res.text()})));
    const bin=atob(chunks.join('').trim());
    const bytes=Uint8Array.from(bin,(char)=>char.charCodeAt(0));
    const html=new TextDecoder('utf-8').decode(bytes);
    document.open();
    document.write(html);
    document.close();
  }catch(err){
    document.body.innerHTML='<div class="loading"><b>加载失败</b><br>请刷新页面，或检查 GitHub Pages 是否已完成发布。</div>';
    console.error(err);
  }
})();
</script>
</body>
</html>
